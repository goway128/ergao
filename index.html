<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日心灵鸡汤 🍵</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

    body {
      font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 680px;
      padding: 40px 30px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(255, 105, 97, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      font-size: 2.8rem;
      color: #ff4d6d;
      margin: 0 0 10px 0;
      text-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
    }

    p {
      color: #555;
      font-size: 1.15rem;
      margin-bottom: 30px;
    }

    #quote {
      font-size: 1.6rem;
      line-height: 1.65;
      min-height: 160px;
      padding: 35px 25px;
      background: white;
      border-radius: 20px;
      box-shadow: inset 0 4px 15px rgba(0,0,0,0.05);
      margin: 30px auto;
      color: #333;
      border: 1px solid #ffe0e6;
    }

    button {
      padding: 16px 52px;
      font-size: 1.28rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(90deg, #ff4d6d, #ff8a80);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255, 77, 109, 0.45);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-5px) scale(1.06);
      box-shadow: 0 15px 40px rgba(255, 77, 109, 0.55);
    }

    /* 视频容器（触发后显示） */
    #video-container {
      display: none;
      width: 100%;
      max-width: 800px;
      margin: 20px auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 450px;
      border: none;
    }

    @media (max-width: 768px) {
      iframe { height: 320px; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="main-container">
    <h1>每日心灵鸡汤</h1>
    <p>点击按钮，获取今日份温暖与智慧～</p>
    <div id="quote">点击下方按钮，让我们开始吧！</div>
    <button id="generate">生成新鸡汤</button>
  </div>

  <!-- Bilibili 视频容器（默认隐藏） -->
  <div id="video-container">
    <iframe src="https://player.bilibili.com/player.html?bvid=BV1c3411H7W1&autoplay=1&mute=0" 
            scrolling="no" 
            border="0" 
            frameborder="no" 
            framespacing="0" 
            allowfullscreen="true">
    </iframe>
  </div>

  <script>
    const quotes = [
      "人生就像一杯茶，不会苦一辈子，但总会苦一阵子。",
      "今天也是元气满满的一天！（bushi）",
      "努力不一定成功，但不努力一定很轻松。",
      "你今天过得怎么样？反正我过得挺好的（手动狗头）。",
      "坚持就是胜利，坚持不住就休息一下再坚持。",
      "朋友，借我五百块？开玩笑的，别当真。",
      "宇宙的答案是 42，但你今天吃饱了吗？",
      "别担心，船到桥头自然直……直沉。",
      "你很棒！真的，除了有时候比较笨。",
      "保持微笑，生活会更甜（甜到发腻）。",
      "多喝热水，真的有用（bushi）。",
      "明天会更好……大概吧。"
    ];

    let clickCount = 0;
    const quoteDiv = document.getElementById('quote');
    const btn = document.getElementById('generate');
    const mainContainer = document.getElementById('main-container');
    const videoContainer = document.getElementById('video-container');

    btn.addEventListener('click', () => {
      clickCount++;
      
      // 随机显示一句鸡汤
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      quoteDiv.textContent = randomQuote;

      // 达到10次后：隐藏鸡汤界面，显示并自动播放 Bilibili 视频
      if (clickCount >= 10) {
        setTimeout(() => {
          mainContainer.style.display = 'none';
          videoContainer.style.display = 'block';
          
          // 轻微滚动到视频位置
          videoContainer.scrollIntoView({ behavior: "smooth" });
        }, 1200);
      }
    });

    // 键盘彩蛋：输入 rick 或 bilibili 直接触发
    let secret = '';
    document.addEventListener('keydown', (e) => {
      secret += e.key.toLowerCase();
      if (secret.includes('rick') || secret.includes('bilibili')) {
        mainContainer.style.display = 'none';
        videoContainer.style.display = 'block';
      }
    });
  </script>
</body>
</html>
